name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node20-semrel-v2
          restore-keys: |
            npm-${{ runner.os }}-node20-semrel-

      - name: Generate release config
        run: |
          cat > .releaserc.cjs <<'EOF'
          const defaultBranch = process.env.DEFAULT_BRANCH || "main";

          module.exports = {
            branches: [defaultBranch],
            tagFormat: "v${version}",
            plugins: [
              [
                "@semantic-release/commit-analyzer",
                {
                  preset: "conventionalcommits",
                  releaseRules: [
                    { breaking: true, release: "major" },
                    { type: "feat", release: "minor" },
                    { type: "fix", release: "patch" }
                  ]
                }
              ],
              ["@semantic-release/release-notes-generator", { preset: "conventionalcommits" }],
              ["@semantic-release/changelog", { changelogFile: "CHANGELOG.md" }],
              ["@semantic-release/exec", { prepareCmd: "echo ${nextRelease.version} > moonhug/version" }],
              ["@semantic-release/git", {
                assets: ["moonhug/version", "CHANGELOG.md"],
                message: "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
              }]
            ]
          };
          EOF

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          npx -y \
            -p semantic-release \
            -p conventional-changelog-conventionalcommits \
            -p @semantic-release/changelog \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @semantic-release/exec \
            -p @semantic-release/git \
            semantic-release
